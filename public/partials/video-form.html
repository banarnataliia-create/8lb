<h1>Video Form</h1>

<form>

    <div class="form-group">

        <label>Title</label>

        <input type="text"
               class="form-control"
               ng-model="video.title">

    </div>

    <div class="form-group">

        <label>Description</label>

        <textarea class="form-control"
                  ng-model="video.description"></textarea>

    </div>

    <input type="button"
           value="Save"
           class="btn btn-primary"
           ng-click="save()">
		   <input type="button"
       value="Delete"
       class="btn btn-danger"
       ng-click="delete()">

</form>
